name: Release (BSD aarch64)

# BSD aarch64 builds run under QEMU emulation and are far too slow to sit on
# the release critical path. This workflow runs independently on the same tag
# push and attaches its tarballs to the GitHub release after the main Release
# workflow has published it. If it fails, the release is unaffected.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # cpal uses its ALSA backend on FreeBSD/NetBSD, so those need
          # alsa-lib + pkgconf. protoc is not needed: the generated gRPC
          # code is committed and build.rs skips codegen.
          - label: freebsd-aarch64
            os: freebsd
            os_version: "14.3"
            install_deps: sudo env ASSUME_ALWAYS_YES=YES pkg install -y rust alsa-lib pkgconf
          - label: netbsd-aarch64
            os: netbsd
            os_version: "10.1"
            install_deps: sudo pkgin -y update && sudo pkgin -y install rust alsa-lib pkgconf
          # Disabled: OpenBSD arm64 build does not work on the emulated VM.
          # - label: openbsd-aarch64
          #   os: openbsd
          #   os_version: "7.9"
          #   install_deps: sudo pkg_add rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On manual dispatch, build the tag's code rather than the branch
          # the workflow was dispatched from.
          ref: ${{ inputs.tag || github.ref }}

      - name: Start ${{ matrix.os }} arm64 VM
        uses: cross-platform-actions/action@v1.3.0
        with:
          operating_system: ${{ matrix.os }}
          version: ${{ matrix.os_version }}
          architecture: arm64
          shell: bash
          memory: 8G
          cpu_count: 4

      - name: Build in VM
        shell: cpa.sh {0}
        run: |
          set -euo pipefail
          ${{ matrix.install_deps }}
          case "$(uname -s)" in
            NetBSD)
              # pkg-config crate looks for `pkg-config`; pkgsrc ships `pkgconf`.
              export PKG_CONFIG=/usr/pkg/bin/pkgconf
              # NetBSD's runtime linker doesn't search /usr/pkg/lib by
              # default, so embed an rpath for libasound.
              export RUSTFLAGS="-C link-arg=-Wl,-rpath,/usr/pkg/lib"
              ;;
            OpenBSD)
              # OpenBSD's default datasize ulimit is too low for rustc
              ulimit -d "$(ulimit -H -d)" 2>/dev/null || true
              ;;
          esac
          # Keep target/ outside the workspace so it isn't synced back
          export CARGO_TARGET_DIR="$HOME/build"
          cargo build --release --locked --bin equalizer
          mkdir -p dist
          cp "$CARGO_TARGET_DIR/release/equalizer" dist/equalizer

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.tag }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          name="equalizer-${version}-${{ matrix.label }}"
          mkdir -p dist/staging
          install -m 0755 dist/equalizer dist/staging/equalizer
          cp README.md LICENSE dist/staging/
          tar -C dist/staging -czf "dist/${name}.tar.gz" .
          (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
          ls -lh dist

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          # The main Release workflow publishes the release; these emulated
          # builds normally finish long after it. Wait briefly in case it is
          # still in flight, then attach our tarball.
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              break
            fi
            echo "Release $TAG not found yet, waiting... ($i/30)"
            sleep 60
          done
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
          gh release upload "$TAG" dist/*.tar.gz dist/*.tar.gz.sha256 \
            --repo "$GITHUB_REPOSITORY" --clobber
